name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_USERNAME: Harshitha-M08

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: monitoring-agent
            path: services/monitoring-agent
          - name: analyzer-agent
            path: services/analyzer-agent
          - name: auto-response-agent
            path: services/auto-response-agent
          - name: notifier-agent
            path: services/notifier-agent
          - name: memory-agent
            path: services/memory-agent
          - name: llm-service
            path: services/llm-service
          - name: approval-dashboard-backend
            path: services/approval-dashboard/backend
          - name: approval-dashboard-frontend
            path: services/approval-dashboard/frontend
          - name: test-app
            path: services/test-app
          - name: prometheus
            path: services/prometheus

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:buildcache,mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.DOCKER_USERNAME }}/${{ matrix.service.name }}:latest
          docker images | grep ${{ matrix.service.name }}

  summary:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Build summary
        run: |
          echo "✅ All 10 Docker images built and pushed successfully!"
          echo ""
          echo "Images available on Docker Hub:"
          echo "  - Harshitha-M08/monitoring-agent:latest"
          echo "  - Harshitha-M08/analyzer-agent:latest"
          echo "  - Harshitha-M08/auto-response-agent:latest"
          echo "  - Harshitha-M08/notifier-agent:latest"
          echo "  - Harshitha-M08/memory-agent:latest"
          echo "  - Harshitha-M08/llm-service:latest"
          echo "  - Harshitha-M08/approval-dashboard-backend:latest"
          echo "  - Harshitha-M08/approval-dashboard-frontend:latest"
          echo "  - Harshitha-M08/test-app:latest"
          echo "  - Harshitha-M08/prometheus:latest"
          echo ""
          echo "🚀 Ready to deploy to Azure!"
