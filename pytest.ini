[pytest]
minversion = 7.0
testpaths = services/*/tests tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=services
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=70

markers =
    asyncio: mark test as async
    unit: mark test as unit test
    integration: mark test as integration test
    e2e: mark test as end-to-end test
    slow: mark test as slow running
    requires_k8s: mark test as requiring kubernetes cluster
    requires_db: mark test as requiring database
    requires_rabbitmq: mark test as requiring RabbitMQ
    requires_redis: mark test as requiring Redis
    requires_qdrant: mark test as requiring Qdrant

console_output_style = progress
log_cli = false
log_cli_level = INFO
