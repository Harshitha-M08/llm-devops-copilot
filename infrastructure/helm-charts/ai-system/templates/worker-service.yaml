{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-system.fullname" . }}-worker
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None  # Headless service for worker pods
  selector:
    {{- include "ai-system.worker.selectorLabels" . | nindent 4 }}
{{- end }}
