{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-system.fullname" . }}-secrets
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.labels" . | nindent 4 }}
type: {{ .Values.secrets.type }}
data:
  {{- range $key, $value := .Values.secrets.data }}
  {{- if $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  # Database credentials
  {{- if not .Values.secrets.data.DATABASE_URL }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (printf "%s-postgres" (include "ai-system.fullname" .)) (int .Values.postgresql.service.port) .Values.postgresql.auth.database | b64enc | quote }}
  {{- end }}

  {{- if not .Values.secrets.data.POSTGRES_PASSWORD }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.password | b64enc | quote }}
  {{- end }}

  # Redis credentials
  {{- if not .Values.secrets.data.REDIS_URL }}
  {{- if .Values.redis.auth.enabled }}
  REDIS_URL: {{ printf "redis://:%s@%s:%d/0" .Values.redis.auth.password (printf "%s-redis" (include "ai-system.fullname" .)) (int .Values.redis.service.port) | b64enc | quote }}
  {{- else }}
  REDIS_URL: {{ printf "redis://%s:%d/0" (printf "%s-redis" (include "ai-system.fullname" .)) (int .Values.redis.service.port) | b64enc | quote }}
  {{- end }}
  {{- end }}

  {{- if not .Values.secrets.data.REDIS_PASSWORD }}
  {{- if .Values.redis.auth.enabled }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | b64enc | quote }}
  {{- end }}
  {{- end }}

  # RabbitMQ credentials
  {{- if not .Values.secrets.data.RABBITMQ_URL }}
  RABBITMQ_URL: {{ printf "amqp://%s:%s@%s:%d/" .Values.rabbitmq.auth.username .Values.rabbitmq.auth.password (printf "%s-rabbitmq" (include "ai-system.fullname" .)) (int .Values.rabbitmq.service.ports.amqp) | b64enc | quote }}
  {{- end }}

  {{- if not .Values.secrets.data.RABBITMQ_DEFAULT_USER }}
  RABBITMQ_DEFAULT_USER: {{ .Values.rabbitmq.auth.username | b64enc | quote }}
  {{- end }}

  {{- if not .Values.secrets.data.RABBITMQ_DEFAULT_PASS }}
  RABBITMQ_DEFAULT_PASS: {{ .Values.rabbitmq.auth.password | b64enc | quote }}
  {{- end }}

  {{- if not .Values.secrets.data.RABBITMQ_ERLANG_COOKIE }}
  RABBITMQ_ERLANG_COOKIE: {{ .Values.rabbitmq.auth.erlangCookie | b64enc | quote }}
  {{- end }}
{{- end }}
