{{- if .Values.rbac.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ai-system.serviceAccountName" . }}
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.labels" . | nindent 4 }}
  {{- with .Values.rbac.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ai-system.fullname" . }}-role
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.labels" . | nindent 4 }}
rules:
  {{- toYaml .Values.rbac.role.rules | nindent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ai-system.fullname" . }}-rolebinding
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ai-system.fullname" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "ai-system.serviceAccountName" . }}
  namespace: {{ include "ai-system.namespace" . }}
{{- end }}
