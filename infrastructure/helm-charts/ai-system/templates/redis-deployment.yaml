{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-system.fullname" . }}-redis
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.redis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.redis.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-system.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "ai-system.redis.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "ai-system.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "ai-system.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: redis
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: {{ include "ai-system.image" (dict "repository" .Values.redis.image.repository "tag" .Values.redis.image.tag "root" .) }}
        imagePullPolicy: {{ .Values.redis.image.pullPolicy | default .Values.global.imagePullPolicy }}
        ports:
        - name: redis
          containerPort: {{ .Values.redis.service.targetPort }}
          protocol: TCP
        {{- if .Values.redis.auth.enabled }}
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        {{- if .Values.redis.env.REDIS_MAXMEMORY }}
        - --maxmemory
        - {{ .Values.redis.env.REDIS_MAXMEMORY }}
        {{- end }}
        {{- if .Values.redis.env.REDIS_MAXMEMORY_POLICY }}
        - --maxmemory-policy
        - {{ .Values.redis.env.REDIS_MAXMEMORY_POLICY }}
        {{- end }}
        {{- end }}
        env:
        {{- if .Values.redis.auth.enabled }}
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "ai-system.fullname" . }}-secrets
              key: REDIS_PASSWORD
        {{- end }}
        {{- with .Values.redis.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.redis.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.redis.resources | nindent 10 }}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
      {{- if .Values.redis.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "ai-system.fullname" . }}-redis-data
      {{- else }}
        emptyDir: {}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-system.fullname" . }}-redis-data
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.redis.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.redis.persistence.accessMode }}
  {{- if .Values.redis.persistence.storageClass }}
  storageClassName: {{ .Values.redis.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}
{{- end }}
