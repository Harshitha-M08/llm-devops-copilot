{{- if .Values.llmService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "ai-system.fullname" . }}-llm-service
  namespace: {{ include "ai-system.namespace" . }}
  labels:
    {{- include "ai-system.llmService.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "ai-system.fullname" . }}-llm-service
  minReplicas: {{ .Values.llmService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.llmService.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.llmService.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.llmService.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.llmService.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.llmService.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
---
{{- end }}
