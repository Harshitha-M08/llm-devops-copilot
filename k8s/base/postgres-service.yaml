apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: ai-system
  labels:
    app: postgres
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: postgresql
    port: 5432
    targetPort: postgresql
  selector:
    app: postgres
  publishNotReadyAddresses: true
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: ai-system
  labels:
    app: postgres
spec:
  type: ClusterIP
  ports:
  - name: postgresql
    port: 5432
    targetPort: postgresql
    protocol: TCP
  selector:
    app: postgres
