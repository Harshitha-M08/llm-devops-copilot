apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-headless
  namespace: ai-system
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: amqp
    port: 5672
    targetPort: amqp
  - name: management
    port: 15672
    targetPort: management
  - name: epmd
    port: 4369
    targetPort: epmd
  - name: clustering
    port: 25672
    targetPort: clustering
  selector:
    app: rabbitmq
  publishNotReadyAddresses: true
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-service
  namespace: ai-system
  labels:
    app: rabbitmq
spec:
  type: ClusterIP
  ports:
  - name: amqp
    port: 5672
    targetPort: amqp
    protocol: TCP
  - name: management
    port: 15672
    targetPort: management
    protocol: TCP
  selector:
    app: rabbitmq
