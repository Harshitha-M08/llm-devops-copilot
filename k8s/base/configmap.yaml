apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-system-config
  namespace: ai-system
  labels:
    app: ai-system
data:
  # Database Configuration
  POSTGRES_HOST: postgres-service
  POSTGRES_PORT: "5432"
  POSTGRES_DB: ai_system

  # Redis Configuration
  REDIS_HOST: redis-service
  REDIS_PORT: "6379"

  # RabbitMQ Configuration
  RABBITMQ_HOST: rabbitmq-service
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"

  # LLM Service Configuration
  LLM_SERVICE_URL: http://llm-service:8000
  LLM_MODEL_NAME: gpt-4
  LLM_MAX_TOKENS: "2048"
  LLM_TEMPERATURE: "0.7"

  # Worker Service Configuration
  WORKER_QUEUE_NAME: ai-tasks
  WORKER_CONCURRENCY: "4"
  WORKER_PREFETCH_COUNT: "10"

  # Approval Backend Configuration
  APPROVAL_BACKEND_PORT: "3000"
  APPROVAL_FRONTEND_URL: http://approval-frontend

  # Approval Frontend Configuration
  APPROVAL_FRONTEND_PORT: "80"
  APPROVAL_BACKEND_URL: http://approval-backend:3000

  # Logging Configuration
  LOG_LEVEL: info
  LOG_FORMAT: json

  # Application Configuration
  NODE_ENV: production
  TZ: UTC
