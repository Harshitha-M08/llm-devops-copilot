apiVersion: v1
kind: Service
metadata:
  name: llm-service
  namespace: ai-system
  labels:
    app: llm-service
    tier: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: llm-service
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
