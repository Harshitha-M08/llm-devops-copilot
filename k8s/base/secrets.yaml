apiVersion: v1
kind: Secret
metadata:
  name: ai-system-secrets
  namespace: ai-system
  labels:
    app: ai-system
type: Opaque
stringData:
  # Database Credentials
  POSTGRES_USER: ai_user
  POSTGRES_PASSWORD: changeme-postgres-password

  # Redis Password
  REDIS_PASSWORD: changeme-redis-password

  # RabbitMQ Credentials
  RABBITMQ_DEFAULT_USER: admin
  RABBITMQ_DEFAULT_PASS: changeme-rabbitmq-password
  RABBITMQ_ERLANG_COOKIE: changeme-erlang-cookie

  # LLM API Keys
  OPENAI_API_KEY: sk-changeme-openai-api-key
  ANTHROPIC_API_KEY: sk-changeme-anthropic-api-key

  # JWT Secrets
  JWT_SECRET: changeme-jwt-secret-key
  JWT_REFRESH_SECRET: changeme-jwt-refresh-secret

  # Session Secret
  SESSION_SECRET: changeme-session-secret

  # Application Secrets
  API_KEY: changeme-api-key
  ENCRYPTION_KEY: changeme-encryption-key
---
# For production, use SealedSecret pattern:
# apiVersion: bitnami.com/v1alpha1
# kind: SealedSecret
# metadata:
#   name: ai-system-secrets
#   namespace: ai-system
# spec:
#   encryptedData:
#     POSTGRES_PASSWORD: AgBxxx...
#     REDIS_PASSWORD: AgByyy...
---
# Or use External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: ai-system-secrets
#   namespace: ai-system
# spec:
#   secretStoreRef:
#     name: aws-secrets-manager
#     kind: SecretStore
#   target:
#     name: ai-system-secrets
#   data:
#   - secretKey: POSTGRES_PASSWORD
#     remoteRef:
#       key: ai-system/postgres-password
