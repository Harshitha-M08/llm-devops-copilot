apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-service
  namespace: ai-system
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: llm-service
        resources:
          requests:
            memory: "1.5Gi"
            cpu: "750m"
          limits:
            memory: "3Gi"
            cpu: "1500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: ai-system
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: worker
        resources:
          requests:
            memory: "384Mi"
            cpu: "350m"
          limits:
            memory: "1.5Gi"
            cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-backend
  namespace: ai-system
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: backend
        resources:
          requests:
            memory: "192Mi"
            cpu: "200m"
          limits:
            memory: "768Mi"
            cpu: "750m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: approval-frontend
  namespace: ai-system
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: nginx
        resources:
          requests:
            memory: "96Mi"
            cpu: "75m"
          limits:
            memory: "192Mi"
            cpu: "350m"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: ai-system
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: rabbitmq
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1.5Gi"
            cpu: "750m"
  volumeClaimTemplates:
  - metadata:
      name: rabbitmq-data
    spec:
      resources:
        requests:
          storage: 8Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ai-system
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: postgres
        resources:
          requests:
            memory: "384Mi"
            cpu: "200m"
          limits:
            memory: "1.5Gi"
            cpu: "750m"
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      resources:
        requests:
          storage: 15Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: ai-system
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: redis
        resources:
          requests:
            memory: "192Mi"
            cpu: "75m"
          limits:
            memory: "384Mi"
            cpu: "350m"
