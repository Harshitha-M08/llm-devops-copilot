apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-system-config
  namespace: ai-system
data:
  # Override environment-specific settings
  NODE_ENV: staging
  LOG_LEVEL: info

  # Staging-specific URLs
  APPROVAL_FRONTEND_URL: http://approval-frontend-staging
  APPROVAL_BACKEND_URL: http://approval-backend-staging:3000

  # Staging settings
  LLM_MAX_TOKENS: "2048"
  WORKER_CONCURRENCY: "3"
  WORKER_PREFETCH_COUNT: "8"
