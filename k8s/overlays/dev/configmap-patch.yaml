apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-system-config
  namespace: ai-system
data:
  # Override environment-specific settings
  NODE_ENV: development
  LOG_LEVEL: debug

  # Dev-specific URLs
  APPROVAL_FRONTEND_URL: http://approval-frontend-dev
  APPROVAL_BACKEND_URL: http://approval-backend-dev:3000

  # Reduced limits for dev
  LLM_MAX_TOKENS: "1024"
  WORKER_CONCURRENCY: "2"
  WORKER_PREFETCH_COUNT: "5"
