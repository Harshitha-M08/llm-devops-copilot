apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-system-config
  namespace: ai-system
data:
  # Override environment-specific settings
  NODE_ENV: production
  LOG_LEVEL: warn

  # Production URLs (replace with actual domains)
  APPROVAL_FRONTEND_URL: https://ai-system.example.com
  APPROVAL_BACKEND_URL: https://api.ai-system.example.com

  # Production settings - optimized for performance
  LLM_MAX_TOKENS: "4096"
  WORKER_CONCURRENCY: "8"
  WORKER_PREFETCH_COUNT: "20"
