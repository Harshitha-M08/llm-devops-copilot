apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-system-ingress
  namespace: ai-system
  annotations:
    # Production-specific annotations
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

    # WAF and DDoS protection
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"

    # Advanced security
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=63072000; includeSubDomains; preload";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.ai-system.example.com";
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: geolocation=(), microphone=(), camera=()";
spec:
  tls:
  - hosts:
    - ai-system.example.com
    - api.ai-system.example.com
    secretName: ai-system-prod-tls
  rules:
  # Frontend - Production domain
  - host: ai-system.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: approval-frontend-prod
            port:
              number: 80

  # Backend API - Production domain
  - host: api.ai-system.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: approval-backend-prod
            port:
              number: 3000
      - path: /llm
        pathType: Prefix
        backend:
          service:
            name: llm-service-prod
            port:
              number: 8000
