apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: llm-service-monitor
  namespace: monitoring
  labels:
    app: llm-service
spec:
  selector:
    matchLabels:
      app: llm-service
  namespaceSelector:
    matchNames:
    - default
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
    scheme: http
---
