apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
data:
  grafana.ini: |
    [analytics]
    check_for_updates = false
    reporting_enabled = false

    [server]
    protocol = http
    http_port = 3000
    domain = localhost
    root_url = %(protocol)s://%(domain)s:%(http_port)s/
    enable_gzip = true

    [database]
    type = sqlite3
    path = /var/lib/grafana/grafana.db

    [session]
    provider = file
    provider_config = /var/lib/grafana/sessions

    [security]
    admin_user = ${GF_SECURITY_ADMIN_USER}
    admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
    disable_gravatar = false
    allow_embedding = false
    cookie_secure = false
    cookie_samesite = lax

    [users]
    allow_sign_up = false
    allow_org_create = false
    auto_assign_org = true
    auto_assign_org_role = Viewer
    default_theme = dark

    [auth]
    disable_login_form = false
    disable_signout_menu = false

    [auth.anonymous]
    enabled = false

    [auth.basic]
    enabled = true

    [log]
    mode = console
    level = info

    [log.console]
    level = info
    format = json

    [metrics]
    enabled = true
    interval_seconds = 10

    [alerting]
    enabled = true
    execute_alerts = true

    [dashboards]
    versions_to_keep = 20
    min_refresh_interval = 5s
    default_home_dashboard_path = /var/lib/grafana/dashboards/system-overview-dashboard.json

    [explore]
    enabled = true

    [unified_alerting]
    enabled = true
