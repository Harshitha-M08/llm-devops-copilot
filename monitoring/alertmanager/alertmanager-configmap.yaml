apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

      # Email configuration
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'alerts@company.com'
      smtp_auth_username: 'alerts@company.com'
      smtp_auth_password: 'your-smtp-password'
      smtp_require_tls: true

      # Slack configuration (optional)
      slack_api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'

      # PagerDuty configuration (optional)
      pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

    # Templates for notifications
    templates:
    - '/etc/alertmanager/*.tmpl'

    # Route tree for alert routing
    route:
      receiver: 'default-receiver'
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h

      routes:
      # Critical alerts go to PagerDuty and Slack
      - match:
          severity: critical
        receiver: 'critical-alerts'
        continue: true
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 3h

      # Page alerts go to PagerDuty immediately
      - match:
          severity: page
        receiver: 'pagerduty'
        continue: true
        group_wait: 0s
        group_interval: 1m
        repeat_interval: 1h

      # Warning alerts go to Slack
      - match:
          severity: warning
        receiver: 'slack-warnings'
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h

      # Service-specific routes
      - match:
          service: llm-service
        receiver: 'llm-team'
        routes:
        - match:
            severity: critical
          receiver: 'llm-team-critical'

      - match:
          service: worker-service
        receiver: 'worker-team'
        routes:
        - match:
            severity: critical
          receiver: 'worker-team-critical'

      - match:
          service: approval-service
        receiver: 'approval-team'

      # Database alerts
      - match_re:
          category: (database|cache|messaging)
        receiver: 'infrastructure-team'
        routes:
        - match:
            severity: critical
          receiver: 'infrastructure-team-critical'

      # Infrastructure alerts
      - match:
          category: infrastructure
        receiver: 'infrastructure-team'
        routes:
        - match:
            severity: critical
          receiver: 'infrastructure-team-critical'

    # Inhibition rules - suppress certain alerts when others are firing
    inhibit_rules:
    # Suppress warning if critical alert is firing for the same alertname and service
    - source_match:
        severity: 'critical'
      target_match:
        severity: 'warning'
      equal: ['alertname', 'service', 'namespace']

    # Suppress individual pod alerts if service is down
    - source_match:
        alertname: 'ServiceDown'
      target_match_re:
        alertname: '(HighCPU|HighMemory|PodNotReady)'
      equal: ['service', 'namespace']

    # Suppress node alerts if entire node is down
    - source_match:
        alertname: 'KubernetesNodeNotReady'
      target_match_re:
        alertname: '(HighCPU|HighMemory|HighDisk)'
      equal: ['node']

    # Receivers - define notification endpoints
    receivers:
    # Default receiver - email to ops team
    - name: 'default-receiver'
      email_configs:
      - to: 'ops-team@company.com'
        headers:
          Subject: '[MONITORING] {{ .GroupLabels.alertname }}'
        html: |
          <!DOCTYPE html>
          <html>
          <body>
            <h2>Alert: {{ .GroupLabels.alertname }}</h2>
            <p><strong>Status:</strong> {{ .Status }}</p>
            <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
            <h3>Alerts:</h3>
            {{ range .Alerts }}
              <p>
                <strong>{{ .Labels.alertname }}</strong><br>
                {{ .Annotations.summary }}<br>
                {{ .Annotations.description }}
              </p>
            {{ end }}
          </body>
          </html>

    # Critical alerts - multiple channels
    - name: 'critical-alerts'
      email_configs:
      - to: 'ops-team@company.com,management@company.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        send_resolved: true
      slack_configs:
      - channel: '#alerts-critical'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
      pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .GroupLabels.instance }}'

    # PagerDuty for immediate response
    - name: 'pagerduty'
      pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}: {{ .GroupLabels.instance }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          resolved: '{{ .Alerts.Resolved | len }}'

    # Slack warnings
    - name: 'slack-warnings'
      slack_configs:
      - channel: '#alerts-warnings'
        title: 'Warning: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
        send_resolved: true
        color: 'warning'

    # LLM team
    - name: 'llm-team'
      email_configs:
      - to: 'llm-team@company.com'
        headers:
          Subject: '[LLM Service] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#llm-service-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

    - name: 'llm-team-critical'
      email_configs:
      - to: 'llm-team@company.com,ops-team@company.com'
        headers:
          Subject: '[CRITICAL - LLM Service] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#llm-service-alerts'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        color: 'danger'
      pagerduty_configs:
      - service_key: 'YOUR_LLM_TEAM_PAGERDUTY_KEY'

    # Worker team
    - name: 'worker-team'
      email_configs:
      - to: 'worker-team@company.com'
        headers:
          Subject: '[Worker Service] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#worker-service-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

    - name: 'worker-team-critical'
      email_configs:
      - to: 'worker-team@company.com,ops-team@company.com'
        headers:
          Subject: '[CRITICAL - Worker Service] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#worker-service-alerts'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        color: 'danger'
      pagerduty_configs:
      - service_key: 'YOUR_WORKER_TEAM_PAGERDUTY_KEY'

    # Approval team
    - name: 'approval-team'
      email_configs:
      - to: 'approval-team@company.com'
        headers:
          Subject: '[Approval Service] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#approval-service-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

    # Infrastructure team
    - name: 'infrastructure-team'
      email_configs:
      - to: 'infrastructure-team@company.com'
        headers:
          Subject: '[Infrastructure] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#infrastructure-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

    - name: 'infrastructure-team-critical'
      email_configs:
      - to: 'infrastructure-team@company.com,ops-team@company.com'
        headers:
          Subject: '[CRITICAL - Infrastructure] {{ .GroupLabels.alertname }}'
      slack_configs:
      - channel: '#infrastructure-alerts'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        color: 'danger'
      pagerduty_configs:
      - service_key: 'YOUR_INFRA_TEAM_PAGERDUTY_KEY'
