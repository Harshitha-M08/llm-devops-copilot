name: Dependency Updates

on:
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        update-type: [patch, minor]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update dependencies
        run: |
          if [ "${{ matrix.update-type }}" == "patch" ]; then
            npm update --save
          else
            npx npm-check-updates -u --target minor
            npm install
          fi

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update ${{ matrix.update-type }} dependencies"
          title: "chore: Update ${{ matrix.update-type }} dependencies"
          body: |
            ## Dependency Updates (${{ matrix.update-type }})

            This PR updates ${{ matrix.update-type }} version dependencies.

            ### Changes
            - Auto-generated by dependency update workflow
            - Updates ${{ matrix.update-type }} versions only

            ### Testing
            - [ ] All tests pass
            - [ ] No breaking changes detected
            - [ ] Security audit passes

            ### Checklist
            - [ ] Review dependency changes
            - [ ] Check for breaking changes in changelogs
            - [ ] Verify application functionality
            - [ ] Review security advisories

            ---
            Auto-generated by GitHub Actions
          branch: dependencies/${{ matrix.update-type }}-updates-${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            automated
            ${{ matrix.update-type }}

  dependabot-auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for Dependabot PRs
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-updates:
    name: Security Updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit fix
        run: |
          npm audit fix --audit-level=moderate
          npm audit fix --force --audit-level=high
        continue-on-error: true

      - name: Run Snyk fix
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: fix
        continue-on-error: true

      - name: Create Pull Request for security fixes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: apply security updates"
          title: "fix: Apply security updates"
          body: |
            ## Security Updates

            This PR applies automatic security fixes to vulnerable dependencies.

            ### Changes
            - Auto-generated security fixes
            - Addresses known vulnerabilities

            ### Testing
            Please review and test thoroughly before merging.

            ### Security Reports
            See the attached workflow run for detailed security reports.

            ---
            Auto-generated by security update workflow
          branch: security/auto-fixes-${{ github.run_number }}
          delete-branch: true
          labels: |
            security
            automated
            high-priority

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check outdated packages
        run: |
          npm outdated > outdated.txt || true
          npx npm-check-updates > ncu.txt || true

      - name: Upload outdated report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-dependencies
          path: |
            outdated.txt
            ncu.txt

      - name: Create issue for major updates
        run: |
          if [ -s ncu.txt ]; then
            CONTENT=$(cat ncu.txt)
            gh issue create \
              --title "Major dependency updates available" \
              --body "## Outdated Dependencies

          The following major version updates are available:

          \`\`\`
          $CONTENT
          \`\`\`

          Please review and update dependencies manually for major version changes.

          ---
          Auto-generated by dependency check workflow" \
              --label "dependencies,enhancement"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  docker-base-image-update:
    name: Update Docker Base Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for base image updates
        run: |
          echo "Checking for Docker base image updates..."
          for dockerfile in $(find . -name "Dockerfile*"); do
            echo "Checking $dockerfile"
            BASE_IMAGE=$(grep -m1 "^FROM" "$dockerfile" | awk '{print $2}')
            echo "Base image: $BASE_IMAGE"
            docker pull "$BASE_IMAGE"
          done

      - name: Update base image tags
        run: |
          # Logic to update base images to latest stable versions
          # This is a placeholder for custom update logic
          echo "Base image update check completed"

  npm-cache-cleanup:
    name: Clean npm Cache
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install
          npm dedupe

      - name: Run tests
        run: npm test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: refresh dependencies and clean cache"
          title: "chore: Refresh dependencies and clean cache"
          body: |
            ## Dependency Refresh

            This PR refreshes the dependency tree with a clean install.

            ### Changes
            - Removed and reinstalled all dependencies
            - Cleaned npm cache
            - Deduped dependencies

            ### Testing
            All tests have been run and should pass.

            ---
            Auto-generated by cache cleanup workflow
          branch: chore/dependency-refresh-${{ github.run_number }}
          delete-branch: true
          labels: |
            dependencies
            maintenance

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [update-dependencies, security-updates, outdated-check]
    if: always()
    steps:
      - name: Send summary notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Dependency update workflow completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":package: *Dependency Update Summary*\n*Repository:* ${{ github.repository }}\n*Status:* ${{ needs.update-dependencies.result }} / ${{ needs.security-updates.result }}\n*Workflow:* Dependency Updates"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Details"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
