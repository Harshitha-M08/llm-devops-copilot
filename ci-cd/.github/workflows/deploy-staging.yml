name: Deploy to Staging

on:
  push:
    tags:
      - 'v*-staging'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  ENVIRONMENT: staging
  CLUSTER_NAME: staging-cluster
  NAMESPACE: staging

jobs:
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION=${{ inputs.tag }}
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Verify images exist
        run: |
          for service in api web worker; do
            echo "Checking image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${service}:${{ steps.version.outputs.version }}"
            docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${service}:${{ steps.version.outputs.version }} || exit 1
          done
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

  deploy:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: staging
      url: https://staging.example.com
    permissions:
      contents: read
      packages: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}
          kubectl config set-context --current --namespace=${{ env.NAMESPACE }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Create namespace if not exists
        run: kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Create secrets
        run: |
          kubectl create secret generic app-secrets \
            --from-literal=database-url=${{ secrets.STAGING_DATABASE_URL }} \
            --from-literal=redis-url=${{ secrets.STAGING_REDIS_URL }} \
            --from-literal=api-key=${{ secrets.STAGING_API_KEY }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create image pull secret
        run: |
          kubectl create secret docker-registry regcred \
            --docker-server=${{ env.REGISTRY }} \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=${{ env.NAMESPACE }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Backup current deployment
        run: |
          kubectl get deployment -n ${{ env.NAMESPACE }} -o yaml > deployment-backup-$(date +%Y%m%d-%H%M%S).yaml
          echo "Backup created"

      - name: Deploy API service with Helm
        run: |
          helm upgrade --install api ./helm/api \
            --namespace ${{ env.NAMESPACE }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api \
            --set image.tag=${{ needs.validate.outputs.version }} \
            --set replicaCount=3 \
            --set environment=staging \
            --set resources.requests.cpu=500m \
            --set resources.requests.memory=512Mi \
            --set resources.limits.cpu=1000m \
            --set resources.limits.memory=1Gi \
            --set autoscaling.enabled=true \
            --set autoscaling.minReplicas=3 \
            --set autoscaling.maxReplicas=10 \
            --wait --timeout=10m

      - name: Deploy Web service with Helm
        run: |
          helm upgrade --install web ./helm/web \
            --namespace ${{ env.NAMESPACE }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web \
            --set image.tag=${{ needs.validate.outputs.version }} \
            --set replicaCount=3 \
            --set environment=staging \
            --set resources.requests.cpu=250m \
            --set resources.requests.memory=256Mi \
            --set resources.limits.cpu=500m \
            --set resources.limits.memory=512Mi \
            --set autoscaling.enabled=true \
            --set autoscaling.minReplicas=3 \
            --set autoscaling.maxReplicas=8 \
            --wait --timeout=10m

      - name: Deploy Worker service with Helm
        run: |
          helm upgrade --install worker ./helm/worker \
            --namespace ${{ env.NAMESPACE }} \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker \
            --set image.tag=${{ needs.validate.outputs.version }} \
            --set replicaCount=2 \
            --set environment=staging \
            --set resources.requests.cpu=500m \
            --set resources.requests.memory=512Mi \
            --set resources.limits.cpu=1000m \
            --set resources.limits.memory=1Gi \
            --wait --timeout=10m

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/api -n ${{ env.NAMESPACE }} --timeout=10m
          kubectl rollout status deployment/web -n ${{ env.NAMESPACE }} --timeout=10m
          kubectl rollout status deployment/worker -n ${{ env.NAMESPACE }} --timeout=10m

      - name: Run comprehensive health checks
        run: bash ./scripts/health-check.sh ${{ env.ENVIRONMENT }}
        timeout-minutes: 10

      - name: Run integration tests
        run: |
          npm ci
          npm run test:integration -- --env=staging
        env:
          API_URL: https://api-staging.example.com
          WEB_URL: https://staging.example.com
        timeout-minutes: 15

      - name: Run performance tests
        run: |
          npm run test:performance -- --env=staging
        env:
          API_URL: https://api-staging.example.com
        continue-on-error: true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, rolling back..."
          bash ./scripts/rollback.sh ${{ env.ENVIRONMENT }}

      - name: Update deployment annotations
        if: success()
        run: |
          kubectl annotate deployment/api \
            kubernetes.io/change-cause="Deployed ${{ needs.validate.outputs.version }} by ${{ github.actor }}" \
            deployment.kubernetes.io/revision="${{ github.run_number }}" \
            -n ${{ env.NAMESPACE }} --overwrite

      - name: Create deployment record
        if: success()
        run: |
          kubectl create configmap deployment-${{ github.run_number }} \
            --from-literal=version=${{ needs.validate.outputs.version }} \
            --from-literal=timestamp=$(date -Iseconds) \
            --from-literal=actor=${{ github.actor }} \
            --from-literal=run-id=${{ github.run_id }} \
            --namespace=${{ env.NAMESPACE }}

      - name: Send success notification
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployment to Staging successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":rocket: *Deployment to Staging Successful*\n*Repository:* ${{ github.repository }}\n*Version:* ${{ needs.validate.outputs.version }}\n*Environment:* Staging\n*Author:* ${{ github.actor }}\n*URL:* https://staging.example.com"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Ready for QA testing"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Send failure notification
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Deployment to Staging failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *Deployment to Staging Failed*\n*Repository:* ${{ github.repository }}\n*Version:* ${{ needs.validate.outputs.version }}\n*Environment:* Staging\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Logs"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
