global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: 'production'
    platform: 'azure-container-apps'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Test app metrics (chaos engineering)
  - job_name: 'test-app'
    static_configs:
      - targets: ['test-app.lemonsea-56412705.centralindia.azurecontainerapps.io']
    scheme: http
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'test-app'
